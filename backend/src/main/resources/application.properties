# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/qrfood}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024}
jwt.expiration=86400000

# Razorpay
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_xxxxxxxxxxxxx}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your_razorpay_secret}

# Frontend URL (for CORS and QR codes)
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Admin defaults (created on first startup)
admin.default.username=${ADMIN_USERNAME:admin}
admin.default.password=${ADMIN_PASSWORD:admin123}
admin.default.restaurant=${ADMIN_RESTAURANT:My Restaurant}
