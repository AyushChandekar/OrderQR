server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---------- Gzip compression ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---------- Asset caching ----------
    # Vite hashed assets — cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static files (favicon, etc.)
    location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ---------- SPA fallback ----------
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html so new deploys are picked up
        location = /index.html {
            add_header Cache-Control "no-cache";
        }
    }

    # ---------- Security headers ----------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable server version leak
    server_tokens off;
}
